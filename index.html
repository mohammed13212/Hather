<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>جامعة الحدود الشمالية | حاضر</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <main class="shell">
    <section class="left" aria-hidden="true"></section>

    <section class="right">
      <div class="brand">
        <div class="ar">جامعة الحدود الشمالية</div>
        <div class="en">Northern Border University</div>
      </div>

      <div class="card">
        <h1>Hather</h1>
        <div class="sub">حاضر</div>

        <form id="form" novalidate>
          <div class="field" id="fieldBox">
            <div class="tag en">Enter university ID</div>

            <input
              id="uid"
              type="text"
              inputmode="numeric"
              maxlength="9"
              autocomplete="off"
            />

            <div class="tag ar">ادخل الرقم الطلابي</div>
          </div>

          <div class="help" id="help">"أدخل الرقم الجامعي 9 أرقام."</div>

          <button class="btn" id="btn" type="submit" disabled>
            <span class="en">Check in</span>
            <span class="ar">اضغط هنا</span>
          </button>

          <div class="status" id="status" aria-live="polite"></div>
        </form>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
